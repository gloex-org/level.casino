<script>
    (function() {
        // Menu Toggle Logic
        const menuToggle = document.getElementById('mobile-menu');
        const navMenu = document.getElementById('navMenu');

        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('is-active');
            navMenu.classList.toggle('active');
        });

        document.querySelectorAll('#navMenu a').forEach(link => {
            link.addEventListener('click', () => {
                menuToggle.classList.remove('is-active');
                navMenu.classList.remove('active');
            });
        });

        // Header Shrink on Scroll Logic
        const headerWrapper = document.getElementById('headerWrapper');
        const mainHeader = document.getElementById('mainHeader');
        
        window.addEventListener('scroll', () => {
            if (window.innerWidth > 768) {
                if (window.scrollY > 40) {
                    headerWrapper.style.transform = 'translateY(-35px)'; 
                    mainHeader.style.padding = '8px 5%'; 
                } else {
                    headerWrapper.style.transform = 'translateY(0)';
                    mainHeader.style.padding = '15px 5%';
                }
            } else {
                mainHeader.style.padding = window.scrollY > 40 ? '10px 5%' : '15px 5%';
            }
        });
    })();
</script>
