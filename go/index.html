<script>
// ==========================
// 🔧 CASINO CONFIG (EDIT ONLY HERE)
// ==========================
const OFFERS = {

    bcgame: {
        url: "https://bc.game/i-3fmehi429-n/",
        blocked: ["US", "GB"]
    },

    stake: {
        url: "https://stake.com/?c=eU3bdx7M",
        blocked: ["US", "GB", "RW", "NL"]
    },

    hello: {
        url: "https://go.superflypartners.net/c/8be2f301",
        blocked: ["GB"]
    }

    // ==========================
    // 👉 ADD MORE CASINOS LIKE THIS:
    // ==========================
    /*
    slotnite: {
        url: "https://your-affiliate-link.com",
        blocked: ["GB", "DE", "FR"]
    },

    skol: {
        url: "https://your-affiliate-link.com",
        blocked: ["GB"]
    },

    diamond7: {
        url: "https://your-affiliate-link.com",
        blocked: []
    }
    */
};

// ==========================
// 🌍 GEO DETECTION (IMPROVED)
// ==========================

function detectGeo() {
    // 1. Try saved geo (best accuracy)
    let geo = localStorage.getItem("lv_geo");

    if (geo) return geo;

    // 2. Fallback using language
    const lang = (navigator.language || "").toLowerCase();

    if (lang.includes("en-gb")) return "GB";
    if (lang.includes("en-us")) return "US";
    if (lang.includes("de")) return "DE";
    if (lang.includes("fr")) return "FR";
    if (lang.includes("rw")) return "RW";
    if (lang.includes("en-rw")) return "RW";
    if (lang.includes("fr-rw")) return "RW";

    return "ROW"; // Rest of World
}

const geo = detectGeo();

// ==========================
// 📊 READ PARAMETERS
// ==========================
const params = new URLSearchParams(window.location.search);

const offer = params.get("offer");
const src   = params.get("src") || "direct";
const rank  = params.get("rank") || "0";

// ==========================
// 🚀 SAFE REDIRECT FUNCTION
// ==========================
function redirect(url) {
    // Use replace so user never sees /go in history
    window.location.replace(url);
}

// ==========================
// ❌ INVALID OFFER HANDLER
// ==========================
if (!offer || !OFFERS[offer]) {
    redirect("/");
} else {

    const config = OFFERS[offer];

    // ==========================
    // 🚫 GEO BLOCK CHECK
    // ==========================
    if (config.blocked && config.blocked.includes(geo)) {
        redirect("/not-available.html");
    } else {

        // ==========================
        // 🔥 CLEAN REDIRECT (NO PARAMS)
        // ==========================
        const finalUrl = config.url;

        // ==========================
        // 📊 OPTIONAL TRACKING (SAFE)
        // ==========================
        console.log("Affiliate Click", {
            offer,
            src,
            rank,
            geo,
            time: new Date().toISOString()
        });

        redirect(finalUrl);
    }
}
</script>
