<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Redirecting...</title>
<meta name="robots" content="noindex, nofollow">
</head>
<body>

<script>

// ==========================
// 🔧 CASINO CONFIG
// ==========================
const OFFERS = {

    bcgame: {
        url: "https://bc.game/i-3fmehi429-n/",
        blocked: ["US", "GB"]
    },

    stake: {
        url: "https://stake.com/?c=eU3bdx7M",
        blocked: ["US", "GB", "RW", "NL"]
    },

    hello: {
        url: "https://go.superflypartners.net/c/8be2f301",
        blocked: ["GB"]
    },

    // 🔁 FALLBACK (IMPORTANT)
    fallback: {
        url: "https://level.casino/"
    }
};

// ==========================
// 🌍 GEO DETECTION
// ==========================
function detectGeo() {
    let geo = localStorage.getItem("lv_geo");
    if (geo) return geo;

    const lang = (navigator.language || "").toLowerCase();

    if (lang.includes("en-gb")) return "GB";
    if (lang.includes("en-us")) return "US";
    if (lang.includes("nl")) return "NL";
    if (lang.includes("de")) return "DE";
    if (lang.includes("rw")) return "RW";

    return "ROW";
}

const geo = detectGeo();

// ==========================
// 📊 PARAMS
// ==========================
const params = new URLSearchParams(window.location.search);
const offer = params.get("offer");

// ==========================
// 🚀 REDIRECT FUNCTION
// ==========================
function redirect(url) {
    window.location.replace(url);
}

// ==========================
// 🔥 CORE LOGIC
// ==========================
if (!offer || !OFFERS[offer]) {

    // ✅ THIS IS WHERE FALLBACK GOES
    redirect(OFFERS.fallback.url);

} else {

    const config = OFFERS[offer];

    // 🚫 GEO BLOCK
    if (config.blocked && config.blocked.includes(geo)) {
        redirect("/not-available.html");
    } else {
        redirect(config.url);
    }
}

</script>

</body>
</html>
