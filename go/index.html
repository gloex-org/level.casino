<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Redirecting...</title>
<meta name="robots" content="noindex, nofollow">
</head>
<body>

<script>
// ==========================
// 🔧 CONFIG (ONLY EDIT HERE)
// ==========================
const OFFERS = {
    bcgame: {
        default: "https://bc.game/i-3fmehi429-n/"
    },
    stake: {
        default: "https://stake.com/?c=eU3bdx7M"
    },
    hello: {
        default: "https://go.superflypartners.net/c/8be2f301"
    }

    // 👉 ADD MORE CASINOS LIKE THIS:
    // slotnite: { default: "https://your-affiliate-link.com" },
    // skol: { default: "https://your-affiliate-link.com" }
};

// ==========================
// 📊 GET URL PARAMETERS
// ==========================
const params = new URLSearchParams(window.location.search);

const offer = params.get("offer");
const src = params.get("src") || "direct";
const rank = params.get("rank") || "0";

// ==========================
// 🚀 REDIRECT ENGINE
// ==========================
if (!offer || !OFFERS[offer]) {
    // fallback safe redirect
    location.replace("/");
} else {

    // base affiliate URL
    const baseUrl = new URL(OFFERS[offer].default);

    // ==========================
    // 📌 TRACKING PARAMETERS
    // ==========================
    baseUrl.searchParams.set("sub1", src);
    baseUrl.searchParams.set("sub2", rank);

    // Optional extra tracking (safe)
    baseUrl.searchParams.set("sub3", "levelcasino");

    // ==========================
    // 🔥 CLEAN REDIRECT (NO HISTORY CLUTTER)
    // ==========================
    location.replace(baseUrl.toString());
}
</script>

</body>
</html>
